<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Work Orders - RDS Ventures</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 min-h-screen text-slate-800">

  <nav class="flex gap-4 p-4 bg-slate-800 text-white">
    <a href="/dashboard/index.html">Dashboard</a>
    <a href="/dashboard/customers.html">Customers</a>
    <a href="/dashboard/workorders.html" class="font-bold">Work Orders</a>
  </nav>

  <main class="max-w-6xl mx-auto p-6 space-y-6">

<section class="bg-white rounded-xl shadow p-6">
  <h2 class="text-2xl font-bold mb-4">Work Orders</h2>

  <input
    id="workOrderSearch"
    type="text"
    placeholder="Search work orders..."
    class="w-full border rounded-lg px-3 py-2 mb-4"
  />

  <div class="overflow-x-auto">
    <table class="w-full text-sm border-collapse">
      <thead>
        <tr class="border-b bg-slate-50">
          <th class="text-left p-3">RowID</th>
          <th class="text-left p-3">WO #</th>
          <th class="text-left p-3">Customer</th>
          <th class="text-left p-3">Subject</th>
<!--           <th class="text-left p-3">Start Date</th>         -->
          <th class="text-left p-3">Status</th>
          <th class="text-left p-3">Address</th>
        </tr>
      </thead>
      <tbody id="workOrderTable"></tbody>
    </table>
  </div>

  <p id="workOrderListMessage" class="text-sm text-slate-500 mt-3"></p>
</section>




    
    <section class="bg-white rounded-xl shadow p-6">
      <h1 class="text-2xl font-bold mb-4">Work Order Photo Upload</h1>

      
<p id="selectedWorkOrderLabel" class="text-sm text-slate-500 mb-4">
  No work order selected.
</p>

      
      <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
        <div>
          <label class="block text-sm font-medium mb-1">Work Order RowID</label>
          <input id="workOrderRowId" type="number" class="w-full border rounded-lg px-3 py-2" />
        </div>

        <div>
          <label class="block text-sm font-medium mb-1">Photo Type</label>
          <select id="photoType" class="w-full border rounded-lg px-3 py-2">
            <option value="Before">Before</option>
            <option value="After">After</option>
          </select>
        </div>

        <div>
          <label class="block text-sm font-medium mb-1">Caption</label>
          <input id="caption" type="text" class="w-full border rounded-lg px-3 py-2" />
        </div>
      </div>

      <div class="mt-4">
        <label class="block text-sm font-medium mb-1">Choose Photo(s)</label>
        <input id="photoFile" type="file" accept="image/*" capture="environment" multiple class="w-full border rounded-lg px-3 py-2" />
      </div>

      <div class="mt-4 flex gap-3">
        <button id="uploadPhotoButton" type="button" class="bg-slate-800 text-white px-4 py-2 rounded-lg">
          Upload Photo(s)
        </button>

        <button id="loadPhotosButton" type="button" class="border px-4 py-2 rounded-lg">
          Load Photo(s)
        </button>
      </div>

      <p id="photoMessage" class="text-sm mt-4"></p>
    </section>

    <section class="bg-white rounded-xl shadow p-6">
      <h2 class="text-2xl font-bold mb-4">Uploaded Photos</h2>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div>
          <h3 class="text-lg font-semibold mb-3">Before Photos</h3>
          <div id="beforePhotoList" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
        </div>

        <div>
          <h3 class="text-lg font-semibold mb-3">After Photos</h3>
           <div id="afterPhotoList" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
        </div>
      </div>
    </section>
  </main>



  
<!-- Image Preview Modal -->
<div id="imageModal" class="hidden fixed inset-0 bg-black/80 z-50 flex items-center justify-center p-4">
  <div class="relative max-w-5xl w-full flex justify-center">
    <button
      id="closeImageModal"
      type="button"
      class="absolute top-2 right-2 bg-white text-slate-900 rounded-full px-3 py-1 text-sm font-medium shadow"
    >
      Close
    </button>

    <img
      id="modalImage"
      src=""
      alt="Preview"
      class="max-h-[90vh] max-w-full rounded-xl shadow-2xl"
    />
  </div>
</div>



<script>
let allWorkOrders = [];



  
    
//FUNCTION LOADWORKORDERS()
async function loadWorkOrders() {
  const listMessage = document.getElementById("workOrderListMessage");
  listMessage.textContent = "Loading work orders...";

  try {
    const res = await fetch("/api/workorders/list");
    const raw = await res.text();

    let data = [];
    try {
      data = raw ? JSON.parse(raw) : [];
    } catch {
      throw new Error(`Invalid JSON from /api/workorders/list: ${raw || "(empty response)"}`);
    }

    if (!res.ok) {
      throw new Error(data.error || `Work order list failed with status ${res.status}`);
    }

    allWorkOrders = Array.isArray(data) ? data : [];
    renderWorkOrders(allWorkOrders);
  } catch (err) {
    console.error("Failed to load work orders:", err);
    listMessage.textContent = err.message || "Failed to load work orders.";
  }
}


  
 
let expandedRowId = null;


  
//FUNCTION RENDERWORKORDERS(WORKORDERS)   
function renderWorkOrders(workOrders) {
  const table = document.getElementById("workOrderTable");
  const listMessage = document.getElementById("workOrderListMessage");

  table.innerHTML = "";

  if (!workOrders || workOrders.length === 0) {
    listMessage.textContent = "No work orders found.";
    return;
  }

  listMessage.textContent = `${workOrders.length} work order(s)`;

  workOrders.forEach(w => {
    // MAIN ROW
    const row = document.createElement("tr");
    row.className = "border-b hover:bg-slate-50 cursor-pointer";

    row.innerHTML = `
      <td class="p-3">${w.RowID ?? ""}</td>
      <td class="p-3">${w.WorkOrderNumber ?? ""}</td>
      <td class="p-3">${w.CustomerName ?? ""}</td>
      <td class="p-3">${w.Subject ?? ""}</td>
      <td class="p-3">${w.Status ?? ""}</td>
      <td class="p-3">${w.Address ?? ""}</td>
    `;

    // DETAIL ROW
    const detailRow = document.createElement("tr");
    detailRow.className = "bg-slate-50";

    const detailCell = document.createElement("td");
    detailCell.colSpan = 6;

    detailCell.innerHTML = `
      <div class="p-4 grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4">
        <div><strong>RowID:</strong> ${w.RowID ?? ""}</div>
        <div><strong>WO #:</strong> ${w.WorkOrderNumber ?? ""}</div>
        <div><strong>Customer:</strong> ${w.CustomerName ?? ""}</div>
        <div><strong>Status:</strong> ${w.Status ?? ""}</div>
        <div><strong>Priority:</strong> ${w.Priority ?? ""}</div>
        <div><strong>Start Date:</strong> ${formatWorkOrderDate(w.StartDate)}</div>

        <div>
          <strong>Before Photos:</strong>
          <span class="inline-flex items-center rounded-full bg-amber-100 px-2 py-1 text-xs font-medium text-amber-800 ml-2">
            ${w.BeforeCount ?? 0}
          </span>
        </div>

        <div>
          <strong>After Photos:</strong>
          <span class="inline-flex items-center rounded-full bg-emerald-100 px-2 py-1 text-xs font-medium text-emerald-800 ml-2">
            ${w.AfterCount ?? 0}
          </span>
        </div>

        <div class="md:col-span-2 xl:col-span-3">
          <strong>Subject:</strong> ${w.Subject ?? ""}
        </div>

        <div class="md:col-span-2 xl:col-span-3">
          <strong>Address:</strong> ${w.Address ?? ""}
        </div>
      </div>
    `;

    detailRow.appendChild(detailCell);

    if (expandedRowId !== w.RowID) {
      detailRow.style.display = "none";
    }

    row.addEventListener("click", () => {
      if (expandedRowId === w.RowID) {
        expandedRowId = null;
      } else {
        expandedRowId = w.RowID;
      }

      selectWorkOrder(w);
      renderWorkOrders(workOrders);
    });

    table.appendChild(row);
    table.appendChild(detailRow);
  });
}


  

  
//FUNCTION SELECTWORKORDER(WORKORDER)
function selectWorkOrder(workOrder) {
  document.getElementById("workOrderRowId").value = workOrder.RowID ?? "";

  document.getElementById("photoMessage").textContent =
    `Selected work order ${workOrder.WorkOrderNumber || workOrder.RowID}`;

  document.getElementById("selectedWorkOrderLabel").textContent =
    `Selected: WO ${workOrder.WorkOrderNumber || workOrder.RowID} - ${workOrder.Subject || ""}`;

  loadPhotos();
}




  
document.getElementById("workOrderSearch").addEventListener("input", (e) => {
  const value = e.target.value.toLowerCase().trim();

  const filtered = allWorkOrders.filter(w =>
    String(w.RowID || "").toLowerCase().includes(value) ||
    String(w.WorkOrderNumber || "").toLowerCase().includes(value) ||
    String(w.CustomerName || "").toLowerCase().includes(value) ||
    String(w.Subject || "").toLowerCase().includes(value) ||
    String(w.Status || "").toLowerCase().includes(value) ||
    String(w.Address || "").toLowerCase().includes(value)
  );

  renderWorkOrders(filtered);
});


  
//FUNCTION UPLOADPHOTO()
async function uploadPhoto() {
  const message = document.getElementById("photoMessage");
  message.textContent = "Uploading...";

  const workOrderRowId = document.getElementById("workOrderRowId").value.trim();
  const photoType = document.getElementById("photoType").value;
  const caption = document.getElementById("caption").value.trim();
  const fileInput = document.getElementById("photoFile");
  const files = Array.from(fileInput.files || []);

  if (!workOrderRowId) {
    message.textContent = "Work Order RowID is required.";
    return;
  }

  if (!files.length) {
    message.textContent = "Please choose one or more photos.";
    return;
  }

  try {
    let successCount = 0;

    for (const file of files) {
      const contentBase64 = await resizeImage(file);

      const payload = {
        workOrderRowId: parseInt(workOrderRowId, 10),
        photoType,
        fileName: file.name,
        contentBase64,
        caption,
        uploadedBy: "dashboard-user"
      };

      const res = await fetch("/api/workorders/photos/upload", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
      });

      if (!res.ok) {
        const text = await res.text();
        throw new Error(text || "Upload failed");
      }

      successCount++;
      message.textContent = `Uploaded ${successCount} of ${files.length}...`;
    }

    message.textContent = `${successCount} photo(s) uploaded successfully.`;
    document.getElementById("photoFile").value = "";
    document.getElementById("caption").value = "";

    await loadPhotos();

  } catch (err) {
    console.error(err);
    message.textContent = err.message || "Upload failed.";
  }
}


  
//FUNCTION RESIZEIMAGE
async function resizeImage(file, maxWidth = 1280, quality = 0.7) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    const reader = new FileReader();

    reader.onload = e => {
      img.src = e.target.result;
    };

    img.onload = () => {
      const canvas = document.createElement("canvas");
      const scale = Math.min(maxWidth / img.width, 1);

      canvas.width = img.width * scale;
      canvas.height = img.height * scale;

      const ctx = canvas.getContext("2d");
      ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

      const base64 = canvas.toDataURL("image/jpeg", quality).split(",")[1];
      resolve(base64);
    };

    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

    




    

//FUNCTION LOADPHOTOS()
    async function loadPhotos() {
      const workOrderRowId = document.getElementById("workOrderRowId").value.trim();
      const beforeList = document.getElementById("beforePhotoList");
      const afterList = document.getElementById("afterPhotoList");
      const message = document.getElementById("photoMessage");

      beforeList.innerHTML = "";
      afterList.innerHTML = "";

      if (!workOrderRowId) {
        message.textContent = "Enter a Work Order RowID to load photos.";
        return;
      }

      message.textContent = "Loading photos...";

      try {
        const res = await fetch(`/api/workorders/photos/list?workOrderRowId=${encodeURIComponent(workOrderRowId)}`);
        const raw = await res.text();
        let data = [];

        try {
          data = raw ? JSON.parse(raw) : [];
        } catch {
          throw new Error(`Invalid JSON from list API: ${raw || "(empty response)"}`);
        }

        if (!res.ok) {
          throw new Error(data.error || `Photo list failed with status ${res.status}`);
        }

        const beforePhotos = data.filter(p => p.PhotoType === "Before");
        const afterPhotos = data.filter(p => p.PhotoType === "After");

        renderPhotoList(beforePhotos, beforeList);
        renderPhotoList(afterPhotos, afterList);

        message.textContent = `${data.length} photo(s) loaded.`;
      } catch (err) {
        console.error(err);
        message.textContent = err.message || "Failed to load photos.";
      }
    }






  
//FUNCTION RENDERPHOTOLIST(PHOTOS,CONTAINER)
function renderPhotoList(photos, container) {
  container.innerHTML = "";

  if (!photos.length) {
    container.innerHTML = `<p class="text-sm text-slate-500">No photos found.</p>`;
    return;
  }

  photos.forEach(photo => {
    const card = document.createElement("div");
    card.className = "rounded-xl border border-slate-200 bg-slate-50 overflow-hidden shadow-sm";

    card.innerHTML = `
      <button type="button" class="photo-preview-button block w-full text-left">
        <img
          src="${photo.ImageUrl}"
          alt="${photo.FileName || "Work order photo"}"
          class="w-full h-56 object-cover bg-slate-200"
        />
      </button>

      <div class="p-3 space-y-1">
        <div class="font-medium text-sm text-slate-900">${photo.FileName || ""}</div>
        <div class="text-xs text-slate-500">${photo.Caption || ""}</div>
        <div class="text-xs text-slate-400">${formatPhotoDate(photo.UploadedAt)}</div>
      </div>
    `;

    const previewButton = card.querySelector(".photo-preview-button");
    previewButton.addEventListener("click", () => {
      openImageModal(photo.ImageUrl);
    });

    container.appendChild(card);
  });
}






  
//FUNCTION FORMATPHOTODATE
function formatPhotoDate(value) {
  if (!value) return "";
    const dt = new Date(value);
  if (Number.isNaN(dt.getTime())) return value;
    return dt.toLocaleString();
}

//FUNCTION FORMATWORKORDERDATE(VALUE)
function formatWorkOrderDate(value) {
  if (!value) return "";

  const dt = new Date(value);
  if (Number.isNaN(dt.getTime())) return value;

  return dt.toLocaleDateString();
}



  
//FUNCTION OPENIMAGEMODAL
function openImageModal(imageUrl) {
  const modal = document.getElementById("imageModal");
  const modalImage = document.getElementById("modalImage");

  modalImage.src = imageUrl;
  modal.classList.remove("hidden");
}







  
//FUNCTION CLOSEIMAGEMODAL
function closeImageModal() {
  const modal = document.getElementById("imageModal");
  const modalImage = document.getElementById("modalImage");

  modal.classList.add("hidden");
  modalImage.src = "";
}    

  document.getElementById("uploadPhotoButton").addEventListener("click", uploadPhoto);
  document.getElementById("loadPhotosButton").addEventListener("click", loadPhotos);
  document.getElementById("closeImageModal").addEventListener("click", closeImageModal);
  document.getElementById("imageModal").addEventListener("click", (e) => {
  
  if (e.target.id === "imageModal") {
    closeImageModal();
  }
});



  
document.addEventListener("DOMContentLoaded", () => {
  loadWorkOrders();
});
    
  </script>
</body>
</html>
