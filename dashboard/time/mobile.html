<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Time</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 text-slate-900">
  <div class="min-h-screen pb-24">
    <header class="sticky top-0 z-20 bg-white border-b border-slate-200">
      <div class="max-w-md mx-auto px-4 py-3 flex items-center justify-between">
        <a href="/dashboard/" class="text-sm font-medium text-slate-600">Back</a>
        <h1 class="text-lg font-semibold">My Time</h1>
        <button id="refreshBtn" class="text-sm font-medium text-blue-600">Refresh</button>
      </div>
    </header>

    <main class="max-w-md mx-auto px-4 py-4 space-y-4">
      <section class="bg-white rounded-2xl shadow-sm border border-slate-200 p-4">
        <div class="flex items-start justify-between gap-3">
          <div>
            <p id="userName" class="text-base font-semibold">Loading...</p>
            <p id="userMeta" class="text-sm text-slate-500">Loading user info...</p>
          </div>
          <span id="modeBadge" class="inline-flex items-center rounded-full bg-slate-100 px-3 py-1 text-xs font-medium text-slate-700">
            --
          </span>
        </div>
      </section>

      <section class="bg-white rounded-2xl shadow-sm border border-slate-200 p-4">
        <div class="flex items-start justify-between gap-3">
          <div>
            <p class="text-sm font-medium text-slate-500">Status</p>
            <p id="statusLabel" class="text-base font-semibold">Checking...</p>
            <p id="statusSubtext" class="text-sm text-slate-500 mt-1">--</p>
          </div>
          <span id="statusBadge" class="inline-flex items-center rounded-full px-3 py-1 text-xs font-medium bg-slate-100 text-slate-700">
            --
          </span>
        </div>
      </section>

      <section id="openEntryCard" class="hidden bg-emerald-50 rounded-2xl shadow-sm border border-emerald-200 p-4">
        <div class="flex items-start justify-between gap-3">
          <div>
            <p class="text-sm font-medium text-emerald-700">Current Entry</p>
            <p id="openEntryTime" class="text-base font-semibold text-emerald-900">Started at --</p>
            <p id="openEntryMeta" class="text-sm text-emerald-700 mt-1">Running</p>
          </div>
        </div>
      </section>

      <section class="bg-white rounded-2xl shadow-sm border border-slate-200 p-4 space-y-4">
        <div>
          <h2 class="text-base font-semibold">Time Entry</h2>
          <p class="text-sm text-slate-500">Clock in and clock out using the buttons below.</p>
        </div>

        <div class="space-y-3">
          <div>
            <label class="block text-sm font-medium mb-1">Work Date</label>
            <input id="workDate" type="date" class="w-full rounded-xl border border-slate-300 px-3 py-3 text-sm" />
          </div>

          <div>
            <label class="block text-sm font-medium mb-1">Break Minutes</label>
            <input id="breakMinutes" type="number" min="0" value="0" class="w-full rounded-xl border border-slate-300 px-3 py-3 text-sm" />
          </div>

          <div>
            <label class="block text-sm font-medium mb-1">Labor Type</label>
            <input id="laborType" type="text" placeholder="General Labor, Admin, Service..." class="w-full rounded-xl border border-slate-300 px-3 py-3 text-sm" />
          </div>

          <div>
            <label class="block text-sm font-medium mb-1">Notes</label>
            <textarea id="notes" rows="4" class="w-full rounded-xl border border-slate-300 px-3 py-3 text-sm" placeholder="Add notes"></textarea>
          </div>
        </div>

        <p id="formMessage" class="text-sm text-slate-500"></p>

        <div class="grid grid-cols-2 gap-3">
          <button id="clockInBtn" class="rounded-xl bg-blue-600 text-white px-4 py-3 text-sm font-semibold">
            Clock In
          </button>
          <button id="clockOutBtn" class="rounded-xl bg-slate-900 text-white px-4 py-3 text-sm font-semibold">
            Clock Out
          </button>
        </div>
      </section>

      <section class="space-y-3">
        <div class="flex items-center justify-between">
          <h2 id="entriesTitle" class="text-base font-semibold">Entries</h2>
        </div>
        <div id="entriesList" class="space-y-3">
          <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-4 text-sm text-slate-500">
            No entries yet.
          </div>
        </div>
      </section>
    </main>
  </div>

  <script>
    let currentUser = null;
    let openEntry = null;
    let refeshTimer = null;

    document.addEventListener("DOMContentLoaded", async () => {
      try {
        wireEvents();
        setToday();
        await loadUser();
        await loadEntries();
        renderStatus();
      } catch (err) {
        console.error(err);
        document.getElementById("formMessage").textContent = err.message || "Failed to load page.";
      }
    });

    function wireEvents() {
      document.getElementById("refreshBtn").addEventListener("click", async () => {
        await loadEntries();
        renderStatus();
      });

      document.getElementById("workDate").addEventListener("change", async () => {
        await loadEntries();
        renderStatus();
      });

      document.getElementById("clockInBtn").addEventListener("click", handleClockIn);
      document.getElementById("clockOutBtn").addEventListener("click", handleClockOut);
    }

    function setToday() {
      const today = new Date();
      const yyyy = today.getFullYear();
      const mm = String(today.getMonth() + 1).padStart(2, "0");
      const dd = String(today.getDate()).padStart(2, "0");
      document.getElementById("workDate").value = `${yyyy}-${mm}-${dd}`;
    }

    async function safeJsonFetch(url, options) {
      const res = await fetch(url, options);
      const text = await res.text();
      console.log(`${url} raw response:`, text);
      const data = text ? JSON.parse(text) : {};
      if (!res.ok || data.ok === false) {
        throw new Error(data.error || `Request failed (${res.status})`);
      }
      return data;
    }

    async function loadUser() {
      const data = await safeJsonFetch("/api/me");

      if (!data.ok || !data.user) {
        throw new Error(data.error || "Unable to load user");
      }

      currentUser = data.user;
      document.getElementById("userName").textContent = currentUser.displayName || currentUser.email || "User";
      document.getElementById("userMeta").textContent =
        `${currentUser.employeeType || "Employee"} • ${currentUser.timeEntryMode || "Unknown mode"}`;
      document.getElementById("modeBadge").textContent = currentUser.timeEntryMode || "--";
    }

    async function loadEntries() {
      const list = document.getElementById("entriesList");
      const selectedDate = document.getElementById("workDate").value;
      document.getElementById("entriesTitle").textContent = `Entries for ${selectedDate}`;

      list.innerHTML = `
        <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-4 text-sm text-slate-500">
          Loading entries...
        </div>
      `;

      try {
        const data = await safeJsonFetch(`/api/timeentries/today?workDate=${encodeURIComponent(selectedDate)}`);
        const items = Array.isArray(data.items) ? data.items : [];

        openEntry = items.find(x => !x.endTime) || null;

        if (!items.length) {
          list.innerHTML = `
            <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-4 text-sm text-slate-500">
              No entries yet.
            </div>
          `;
          return;
        }

        list.innerHTML = items.map(item => `
          <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-4">
            <div class="flex items-start justify-between gap-3">
              <div>
                <p class="text-sm font-semibold text-slate-900">${escapeHtml(item.workOrderNumber || "Time Entry")}</p>
                <p class="text-sm text-slate-600">${formatDisplayTime(item.startTime)} - ${item.endTime ? formatDisplayTime(item.endTime) : "Running"}</p>
                ${item.laborType ? `<p class="text-xs text-slate-500 mt-1">Labor: ${escapeHtml(item.laborType)}</p>` : ""}
                ${item.notes ? `<p class="text-xs text-slate-500 mt-1">${escapeHtml(item.notes)}</p>` : ""}
              </div>
              <div class="text-sm font-medium text-slate-700">
                ${Number(item.hoursWorked || 0).toFixed(2)} hrs
              </div>
            </div>
          </div>
        `).join("");
      } catch (err) {
        console.error(err);
        openEntry = null;
        list.innerHTML = `
          <div class="bg-white rounded-2xl shadow-sm border border-red-200 p-4 text-sm text-red-600">
            Failed to load entries.
          </div>
        `;
        document.getElementById("formMessage").textContent = err.message || "Failed to load entries.";
      }
    }

    function renderStatus() {
      const statusLabel = document.getElementById("statusLabel");
      const statusSubtext = document.getElementById("statusSubtext");
      const statusBadge = document.getElementById("statusBadge");
      const openCard = document.getElementById("openEntryCard");
      const openEntryTime = document.getElementById("openEntryTime");
      const openEntryMeta = document.getElementById("openEntryMeta");
      const clockInBtn = document.getElementById("clockInBtn");
      const clockOutBtn = document.getElementById("clockOutBtn");

      if (openEntry) {
        statusLabel.textContent = "Clocked In";
        statusSubtext.textContent = `Started at ${formatDisplayTime(openEntry.startTime)}`;
        statusBadge.textContent = "CLOCKED IN";
        statusBadge.className = "inline-flex items-center rounded-full px-3 py-1 text-xs font-medium bg-emerald-100 text-emerald-800";
        openCard.classList.remove("hidden");
        openEntryTime.textContent = `Started at ${formatDisplayTime(openEntry.startTime)}`;
        openEntryMeta.textContent = `${openEntry.laborType ? `Labor: ${openEntry.laborType}` : "Running"}${openEntry.notes ? ` • ${openEntry.notes}` : ""}`;
        clockInBtn.disabled = true;
        clockInBtn.className = "rounded-xl bg-slate-300 text-slate-500 px-4 py-3 text-sm font-semibold";
        clockOutBtn.disabled = false;
        clockOutBtn.className = "rounded-xl bg-red-600 text-white px-4 py-3 text-sm font-semibold";
      } else {
        statusLabel.textContent = "Clocked Out";
        statusSubtext.textContent = "No open time entry";
        statusBadge.textContent = "CLOCKED OUT";
        statusBadge.className = "inline-flex items-center rounded-full px-3 py-1 text-xs font-medium bg-slate-100 text-slate-700";
        openCard.classList.add("hidden");
        clockInBtn.disabled = false;
        clockInBtn.className = "rounded-xl bg-blue-600 text-white px-4 py-3 text-sm font-semibold";
        clockOutBtn.disabled = true;
        clockOutBtn.className = "rounded-xl bg-slate-300 text-slate-500 px-4 py-3 text-sm font-semibold";
      }
    }

    async function handleClockIn() {
      if (openEntry) {
        document.getElementById("formMessage").textContent = "You already have an open time entry.";
        return;
      }

      try {
        document.getElementById("formMessage").textContent = "Clocking in...";

        const payload = {
          mode: "timecard",
          workDate: document.getElementById("workDate").value,
          startTime: getNowHHMM(),
          breakMinutes: Number(document.getElementById("breakMinutes").value || 0),
          laborType: document.getElementById("laborType").value || null,
          notes: document.getElementById("notes").value || null,
          workOrderRowId: null
        };

        await safeJsonFetch("/api/timeentries/start", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });

        document.getElementById("formMessage").textContent = "Clocked in.";
        await loadEntries();
        renderStatus();
      } catch (err) {
        console.error(err);
        document.getElementById("formMessage").textContent = err.message || "Clock in failed.";
      }
    }

    async function handleClockOut() {
      if (!openEntry) {
        document.getElementById("formMessage").textContent = "No open time entry found.";
        return;
      }

      try {
        document.getElementById("formMessage").textContent = "Clocking out...";

       await safeJsonFetch("/api/timeentries/stop", {
  method: "POST",
  headers: { "Content-Type": "application/json" },
  body: JSON.stringify({
    workDate: document.getElementById("workDate").value,
    endTime: getNowHHMM()
  })
});

        document.getElementById("formMessage").textContent = "Clocked out.";
        await loadEntries();
        renderStatus();
      } catch (err) {
        console.error(err);
        document.getElementById("formMessage").textContent = err.message || "Clock out failed.";
      }
    }

    function getNowHHMM() {
      const now = new Date();
      const hh = String(now.getHours()).padStart(2, "0");
      const mm = String(now.getMinutes()).padStart(2, "0");
      return `${hh}:${mm}`;
    }

    function formatDisplayTime(value) {
      if (!value) return "--";

      const str = String(value);

      const isoMatch = str.match(/T(\d{2}):(\d{2})/);
      if (isoMatch) {
        let hh = Number(isoMatch[1]);
        const mm = isoMatch[2];
        const suffix = hh >= 12 ? "PM" : "AM";
        hh = hh % 12 || 12;
        return `${hh}:${mm} ${suffix}`;
      }

      const plainMatch = str.match(/^(\d{2}):(\d{2})/);
      if (plainMatch) {
        let hh = Number(plainMatch[1]);
        const mm = plainMatch[2];
        const suffix = hh >= 12 ? "PM" : "AM";
        hh = hh % 12 || 12;
        return `${hh}:${mm} ${suffix}`;
      }

      return str;
    }

    function escapeHtml(str) {
      return String(str)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }
  </script>
</body>
</html>
