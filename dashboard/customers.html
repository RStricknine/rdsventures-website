<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Customers - RDS Ventures</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 min-h-screen">

<nav class="flex gap-4 p-4 bg-slate-800 text-white">
  <a href="/dashboard/index.html">Dashboard</a>
  <a href="/dashboard/customers.html" class="font-bold">Customers</a>
</nav>

<div class="bg-white rounded-xl shadow p-6 mb-6">
  <h2 class="text-xl font-bold mb-4">Active Customers</h2>

  <input
    id="search"
    placeholder="Search customers..."
    class="w-full border rounded-lg px-3 py-2 mb-4"
  />

  <table class="w-full text-sm">
    <thead>
      <tr class="border-b">
        <th class="text-left p-2">Name</th>
        <th class="text-left p-2">Email</th>
        <th class="text-left p-2">Phone</th>
        <th class="text-left p-2">City</th>
      </tr>
    </thead>
    <tbody id="customerTable"></tbody>
  </table>
</div>







  
  <main class="max-w-3xl mx-auto p-6">
    <div class="bg-white rounded-xl shadow p-6">
      <h1 class="text-2xl font-bold mb-6">Add Customer</h1>

      <form id="customerForm" class="space-y-4">
<input id="customerId" type="hidden" />
        <div>
          <label class="block text-sm font-medium mb-1">Name</label>
          <input id="name" type="text" class="w-full border rounded-lg px-3 py-2" required />
        </div>
<div>
  <label class="block text-sm font-medium mb-1">Email</label>
  <input id="email" type="email" class="w-full border rounded-lg px-3 py-2" />
</div>

<div>
  <label class="block text-sm font-medium mb-1">Phone</label>
  <input id="phone" type="text" class="w-full border rounded-lg px-3 py-2" />
</div>
        <div>
          <label class="block text-sm font-medium mb-1">Billing Street</label>
          <input id="address" type="text" class="w-full border rounded-lg px-3 py-2" />
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
          <div>
            <label class="block text-sm font-medium mb-1">City</label>
            <input id="city" type="text" class="w-full border rounded-lg px-3 py-2" />
          </div>

          <div>
            <label class="block text-sm font-medium mb-1">State</label>
            <input id="state" type="text" class="w-full border rounded-lg px-3 py-2" />
          </div>

          <div>
            <label class="block text-sm font-medium mb-1">Postal Code</label>
            <input id="postalCode" type="text" class="w-full border rounded-lg px-3 py-2" />
          </div>
        </div>

        <div class="flex items-center gap-2">
          <input id="isActive" type="checkbox" checked />
          <label class="text-sm">Active</label>
        </div>

        <button class="bg-slate-800 text-white px-4 py-2 rounded-lg">
          Save Customer
        </button>
<div class="flex gap-3">
  <button id="saveButton" class="bg-slate-800 text-white px-4 py-2 rounded-lg">
    Save Customer
  </button>

  <button type="button" id="cancelEditButton" class="border px-4 py-2 rounded-lg hidden">
    Cancel Edit
  </button>
</div>
        <p id="message" class="text-sm"></p>

      </form>
    </div>
  </main>

  <script>




async function loadCustomers() {
  try {
    const res = await fetch("/api/customers/list");
    const data = await res.json();

    renderCustomers(data);
  } catch (err) {
    console.error("Failed to load customers:", err);
  }
}

function renderCustomers(customers) {
  const table = document.getElementById("customerTable");
  table.innerHTML = "";

  customers.forEach(c => {
    const row = document.createElement("tr");
    row.className = "border-b";

    row.innerHTML = `
      <td class="p-2">${c.Name || ""}</td>
      <td class="p-2">${c.Email || ""}</td>
      <td class="p-2">${c.Phone || ""}</td>
      <td class="p-2">${c.BillingCity || ""}</td>
    `;

    table.appendChild(row);
  });
}



document.getElementById("search").addEventListener("input", (e) => {
  const value = e.target.value.toLowerCase();

  const rows = document.querySelectorAll("#customerTable tr");

  rows.forEach(row => {
    row.style.display = row.textContent.toLowerCase().includes(value)
      ? ""
      : "none";
  });
});










    
    document.getElementById("customerForm").addEventListener("submit", async (e) => {
      e.preventDefault();

      const message = document.getElementById("message");
      message.textContent = "Saving...";

const payload = {
  name: document.getElementById("name").value.trim(),
  email: document.getElementById("email").value.trim(),
  phone: document.getElementById("phone").value.trim(),
  address: document.getElementById("address").value.trim(),
  city: document.getElementById("city").value.trim(),
  state: document.getElementById("state").value.trim(),
  postalCode: document.getElementById("postalCode").value.trim(),
  isActive: document.getElementById("isActive").checked
};;

 try {
  const res = await fetch("/api/customers/create", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(payload)
  });

  const data = await res.json();

  if (!res.ok) throw new Error(data.error);

  message.textContent = "Customer saved successfully.";
  document.getElementById("customerForm").reset();
  document.getElementById("isActive").checked = true;

} catch (err) {
  console.error(err);
  message.textContent = err.message || "Error saving customer.";
}
    });

   loadCustomers(); 
  </script>

</body>
</html>
