<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Customers - RDS Ventures</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 min-h-screen text-slate-800">

  <nav class="flex gap-4 p-4 bg-slate-800 text-white">
    <a href="/dashboard/index.html">Dashboard</a>
    <a href="/dashboard/customers.html" class="font-bold">Customers</a>
  </nav>

  <main class="max-w-6xl mx-auto p-6 space-y-6">

    <!-- Active Customers -->
    <section class="bg-white rounded-xl shadow p-6">
      <h2 class="text-2xl font-bold mb-4">Active Customers</h2>

      <input
        id="search"
        type="text"
        placeholder="Search customers..."
        class="w-full border rounded-lg px-3 py-2 mb-4"
      />

      <div class="overflow-x-auto">
        <table class="w-full text-sm border-collapse">
          <thead>
            <tr class="border-b bg-slate-50">
              <th class="text-left p-3">Name</th>
              <th class="text-left p-3">Type</th> 
              <th class="text-left p-3">Email</th>
              <th class="text-left p-3">Phone</th>
              <th class="text-left p-3">City</th>
              <th class="text-left p-3">State</th>
            </tr>
          </thead>
          <tbody id="customerTable"></tbody>
        </table>
      </div>

      <p id="listMessage" class="text-sm text-slate-500 mt-3"></p>
    </section>

    <!-- Add Customer -->
    <section id="add" class="bg-white rounded-xl shadow p-6">
      <h2 class="text-2xl font-bold mb-6">Add Customer</h2>

      <form id="customerForm" class="space-y-4">
        <input id="customerId" type="hidden" />

        <div>
          <label class="block text-sm font-medium mb-1">Name</label>
          <input id="name" type="text" class="w-full border rounded-lg px-3 py-2" required />
        </div>
        <div>
          <label class="block text-sm font-medium mb-1">Customer Type</label>
          <select id="customerTypeId" class="w-full border rounded-lg px-3 py-2">
            <option value="">Select type</option>
          </select>
        </div>
        <div>
          <label class="block text-sm font-medium mb-1">Email</label>
          <input id="email" type="email" class="w-full border rounded-lg px-3 py-2" />
        </div>

        <div>
          <label class="block text-sm font-medium mb-1">Phone</label>
          <input id="phone" type="text" class="w-full border rounded-lg px-3 py-2" />
        </div>

        <div>
          <label class="block text-sm font-medium mb-1">Billing Street</label>
          <input id="address" type="text" class="w-full border rounded-lg px-3 py-2" />
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
          <div>
            <label class="block text-sm font-medium mb-1">City</label>
            <input id="city" type="text" class="w-full border rounded-lg px-3 py-2" />
          </div>

          <div>
            <label class="block text-sm font-medium mb-1">State</label>
            <input id="state" type="text" class="w-full border rounded-lg px-3 py-2" />
          </div>

          <div>
            <label class="block text-sm font-medium mb-1">Postal Code</label>
            <input id="postalCode" type="text" class="w-full border rounded-lg px-3 py-2" />
          </div>
        </div>

        <div class="flex items-center gap-2">
          <input id="isActive" type="checkbox" checked />
          <label for="isActive" class="text-sm">Active</label>
        </div>

        <div class="flex gap-3">
          <button id="saveButton" type="submit" class="bg-slate-800 text-white px-4 py-2 rounded-lg">
            Save Customer
          </button>

          <button id="cancelEditButton" type="button" class="hidden border px-4 py-2 rounded-lg">
            Cancel Edit
          </button>
        </div>

        <p id="message" class="text-sm"></p>
      </form>
    </section>
  </main>

  <script>
    let allCustomers = [];

    function resetCustomerForm() {
      document.getElementById("customerId").value = "";
      document.getElementById("customerForm").reset();
      document.getElementById("isActive").checked = true;
      document.getElementById("saveButton").textContent = "Save Customer";
      document.getElementById("cancelEditButton").classList.add("hidden");
      document.getElementById("message").textContent = "";
    }

    function renderCustomers(customers) {
      const table = document.getElementById("customerTable");
      const listMessage = document.getElementById("listMessage");
      table.innerHTML = "";

      if (!customers || customers.length === 0) {
        listMessage.textContent = "No active customers found.";
        return;
      }

      listMessage.textContent = `${customers.length} customer(s)`;

      customers.forEach(c => {
        const row = document.createElement("tr");
        row.className = "border-b hover:bg-slate-50 cursor-pointer";

       row.innerHTML = `
          <td class="p-3">${c.Name || ""}</td>
          <td class="p-3">${c.CustomerTypeName || ""}</td>
          <td class="p-3">${c.Email || ""}</td>
          <td class="p-3">${c.Phone || ""}</td>
          <td class="p-3">${c.BillingCity || ""}</td>
          <td class="p-3">${c.BillingState || ""}</td>
        `;

        row.addEventListener("click", () => {
          document.getElementById("customerId").value = c.CustomerId || "";
          document.getElementById("name").value = c.Name || "";
          document.getElementById("email").value = c.Email || "";
          document.getElementById("phone").value = c.Phone || "";
          document.getElementById("address").value = c.BillingStreet || "";
          document.getElementById("city").value = c.BillingCity || "";
          document.getElementById("state").value = c.BillingState || "";
          document.getElementById("postalCode").value = c.BillingPostalCode || "";
          document.getElementById("isActive").checked = !!c.IsActive;

          document.getElementById("saveButton").textContent = "Update Customer";
          document.getElementById("cancelEditButton").classList.remove("hidden");
          document.getElementById("add").scrollIntoView({ behavior: "smooth" });
        });

        table.appendChild(row);
      });
    }

    async function loadCustomers() {
      const listMessage = document.getElementById("listMessage");
      listMessage.textContent = "Loading customers...";

      try {
        const res = await fetch("/api/customers/list");
        const raw = await res.text();
        let data = [];

        try {
          data = raw ? JSON.parse(raw) : [];
        } catch {
          throw new Error(`Invalid JSON from /api/customers/list: ${raw || "(empty response)"}`);
        }

        if (!res.ok) {
          throw new Error(data.error || `Customer list failed with status ${res.status}`);
        }

        allCustomers = Array.isArray(data) ? data : [];
        renderCustomers(allCustomers);
      } catch (err) {
        console.error("Failed to load customers:", err);
        listMessage.textContent = err.message || "Failed to load customers.";
      }
    }

    document.getElementById("search").addEventListener("input", (e) => {
      const value = e.target.value.toLowerCase().trim();

      const filtered = allCustomers.filter(c =>
        (c.Name || "").toLowerCase().includes(value) ||
        (c.Email || "").toLowerCase().includes(value) ||
        (c.Phone || "").toLowerCase().includes(value) ||
        (c.BillingCity || "").toLowerCase().includes(value) ||
        (c.BillingState || "").toLowerCase().includes(value)
      );

      renderCustomers(filtered);
    });

    document.getElementById("cancelEditButton").addEventListener("click", () => {
      resetCustomerForm();
    });

    document.getElementById("customerForm").addEventListener("submit", async (e) => {
      e.preventDefault();

      const message = document.getElementById("message");
      message.textContent = "Saving...";

      const customerId = document.getElementById("customerId").value.trim();

      const payload = {
        customerId,
        name: document.getElementById("name").value.trim(),
        email: document.getElementById("email").value.trim(),
        phone: document.getElementById("phone").value.trim(),
        address: document.getElementById("address").value.trim(),
        city: document.getElementById("city").value.trim(),
        state: document.getElementById("state").value.trim(),
        postalCode: document.getElementById("postalCode").value.trim(),
        isActive: document.getElementById("isActive").checked
      };

      const url = customerId ? "/api/customers/update" : "/api/customers/create";

      try {
        const res = await fetch(url, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });

        const raw = await res.text();
        let data = {};

        try {
          data = raw ? JSON.parse(raw) : {};
        } catch {
          throw new Error(`Invalid JSON from ${url}: ${raw || "(empty response)"}`);
        }

        if (!res.ok) {
          throw new Error(data.error || `Save failed with status ${res.status}`);
        }

        message.textContent = customerId
          ? "Customer updated successfully."
          : "Customer saved successfully.";

        resetCustomerForm();
        await loadCustomers();
      } catch (err) {
        console.error(err);
        message.textContent = err.message || "Error saving customer.";
      }
    });

      async function loadCustomerTypes() {
        try {
          const res = await fetch("/api/customers/types");
          const types = await res.json();
      
          const select = document.getElementById("customerTypeId");
          select.innerHTML = '<option value="">Select type</option>';
      
          types.forEach(t => {
            const option = document.createElement("option");
            option.value = t.CustomerTypeId;
            option.textContent = t.TypeName;
            select.appendChild(option);
          });
        } catch (err) {
          console.error("Failed to load customer types:", err);
        }
      }
    
    document.addEventListener("DOMContentLoaded", () => {
      loadCustomers();
      loadCustomerTypes();
    });
  </script>
</body>
</html>
