<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 text-slate-900">
  <header class="border-b bg-white">
    <div class="mx-auto flex max-w-6xl items-center justify-between px-6 py-4">
      <div>
        <h1 class="text-2xl font-bold">Dashboard</h1>
        <p class="text-sm text-slate-500">Internal portal</p>
      </div>
      <div class="flex items-center gap-3">
        <span id="userName" class="text-sm text-slate-600"></span>
        <a href="/.auth/logout" class="rounded-lg border px-4 py-2 text-sm hover:bg-slate-100">Logout</a>
      </div>
    </div>
  </header>

  <main class="mx-auto max-w-6xl px-6 py-8">
    <div class="mb-8 grid gap-4 md:grid-cols-3">
      <div class="rounded-2xl bg-white p-6 shadow-sm border">
        <div class="text-sm text-slate-500">Customers</div>
        <div id="customersCount" class="mt-2 text-3xl font-semibold">-</div>
      </div>
      <div class="rounded-2xl bg-white p-6 shadow-sm border">
        <div class="text-sm text-slate-500">Properties</div>
        <div id="propertiesCount" class="mt-2 text-3xl font-semibold">-</div>
      </div>
      <div class="rounded-2xl bg-white p-6 shadow-sm border">
        <div class="text-sm text-slate-500">Open Work Orders</div>
        <div id="workOrdersCount" class="mt-2 text-3xl font-semibold">-</div>
      </div>
    </div>

<div class="rounded-2xl bg-white p-6 shadow-sm border border-slate-200">
  <h3 class="text-lg font-semibold text-slate-900 mb-4">Recent Activity</h3>

 <ul id="recentList" class="mt-5 space-y-3 text-sm text-slate-700"></ul>
 
</div>
  </main>

   <!-- Dashboard Content Above -->

  <script>
  async function loadUser() {
    try {
      const res = await fetch("/.auth/me");
      if (!res.ok) return;

      const data = await res.json();
      const principal = data?.clientPrincipal;
      const userNameEl = document.getElementById("userName");

      if (principal && userNameEl) {
        userNameEl.textContent = principal.userDetails || "Signed in";
      }
    } catch (err) {
      console.error("Failed to load user:", err);
    }
  }

  async function loadDashboard() {
    try {
      const res = await fetch("/api/dashboard");
      if (!res.ok) {
        throw new Error("Dashboard API failed: " + res.status);
      }

      const data = await res.json();

      const customersEl = document.getElementById("customersCount");
      const propertiesEl = document.getElementById("propertiesCount");
      const workOrdersEl = document.getElementById("workOrdersCount");
      const requestsEl = document.getElementById("requestsCount");
      const recentList = document.getElementById("recentList");

      if (customersEl) customersEl.textContent = data.customers ?? 0;
      if (propertiesEl) propertiesEl.textContent = data.properties ?? 0;
      if (workOrdersEl) workOrdersEl.textContent = data.openWorkOrders ?? 0;
      if (requestsEl) requestsEl.textContent = data.newRequests ?? 0;

      if (recentList) {
        recentList.innerHTML = "";

        (data.recentActivity || []).forEach(item => {
          const li = document.createElement("li");
          li.className = "rounded-xl border border-slate-200 bg-slate-50 px-4 py-3";
          li.textContent = item;
          recentList.appendChild(li);
        });
      }
    } catch (err) {
      console.error("Dashboard load failed:", err);
    }
  }

  document.addEventListener("DOMContentLoaded", () => {
    loadUser();
    loadDashboard();
  });
</script>
</body>
</html>
